<form [formGroup]="form" (ngSubmit)="save.emit()">
  <div class="agenda-form__field">
    <label for="alunoId">Aluno</label>
    <select id="alunoId" formControlName="alunoId" [disabled]="disabled">
      <option value="">Selecione…</option>
      @for (a of alunos; track a.id) {
        <option [value]="a.id">{{ a.nome }}</option>
      }
    </select>
    @if (form.get('alunoId')?.invalid && form.get('alunoId')?.touched) {
      <span class="agenda-form__err">Selecione um aluno.</span>
    }
  </div>

  <fieldset class="agenda-form__dias">
    <legend>Dias da semana</legend>
    <div class="agenda-form__dias-btns">
      @for (d of diasSemana; track d.valor) {
        <button
          type="button"
          class="agenda-form__dia-btn"
          [class.agenda-form__dia-btn--on]="isDiaMarcado(d.valor)"
          [disabled]="disabled"
          (click)="toggleDia.emit(d.valor)"
        >
          {{ d.rotulo }}
        </button>
      }
    </div>
    @if (diasErro) {
      <span class="agenda-form__err">Marque pelo menos um dia.</span>
    }
  </fieldset>

  <librasflow-form-field label="Início" [control]="form.get('horaInicio')">
    <input type="time" formControlName="horaInicio" [disabled]="disabled" />
  </librasflow-form-field>

  <librasflow-form-field label="Fim (opcional)" [control]="form.get('horaFim')">
    <input type="time" formControlName="horaFim" [disabled]="disabled" />
  </librasflow-form-field>

  <librasflow-form-field label="Observações" [control]="form.get('observacoes')">
    <textarea formControlName="observacoes" rows="2" [disabled]="disabled"></textarea>
  </librasflow-form-field>

  <div class="agenda-form__actions">
    <librasflow-button type="submit" [disabled]="disabled">Salvar</librasflow-button>
    <librasflow-button type="button" variant="secondary" [disabled]="disabled" (clicked)="cancel.emit()">
      Cancelar
    </librasflow-button>
  </div>
</form>
